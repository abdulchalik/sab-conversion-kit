<!DOCTYPE html>
<!--
  ╔══════════════════════════════════════════════════════╗
  ║  COMPONENT: countdown-timer                          ║
  ║  Style: Dark teal theme, large digit blocks          ║
  ║  Source: landing-webinar.html                        ║
  ║  Customise: COUNTDOWN_TARGET date string below.      ║
  ╚══════════════════════════════════════════════════════╝
-->
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Component: Countdown Timer</title>
  <link href="https://fonts.googleapis.com/css2?family=Raleway:wght@400;700;800;900&family=Open+Sans:wght@400;600&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    :root {
      --color-bg:        #042F2E;
      --color-surface:   #134E4A;
      --color-primary:   #0F766E;
      --color-secondary: #14B8A6;
      --color-text:      #F0FDFA;
      --color-muted:     rgba(240,253,250,.6);
    }
    body {
      margin: 0;
      font-family: 'Open Sans', sans-serif;
      background: var(--color-bg);
      color: var(--color-text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* ── Countdown wrapper ── */
    .countdown-section {
      text-align: center;
      padding: 3rem 1.5rem;
      width: 100%;
    }

    .countdown-label {
      font-size: .7rem;
      font-weight: 700;
      letter-spacing: .18em;
      text-transform: uppercase;
      color: var(--color-muted);
      margin-bottom: 1.5rem;
    }

    .countdown-wrap {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: .75rem;
      flex-wrap: wrap;
    }

    /* Digit block */
    .cd-block {
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .cd-num {
      font-family: 'Raleway', sans-serif;
      font-weight: 900;
      font-size: clamp(2.5rem, 8vw, 5rem);
      line-height: 1;
      color: var(--color-text);
      background: var(--color-surface);
      border: 1px solid rgba(20,184,166,.25);
      border-radius: .75rem;
      min-width: clamp(70px, 15vw, 110px);
      padding: .75rem .5rem;
      text-align: center;
      box-shadow: 0 4px 20px rgba(0,0,0,.35);
      /* Flip animation class */
      transition: transform .15s ease-in, opacity .1s;
    }

    .cd-num.flip {
      transform: rotateX(90deg);
      opacity: 0;
    }

    .cd-lbl {
      font-size: .7rem;
      font-weight: 700;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: var(--color-secondary);
      margin-top: .6rem;
    }

    /* Separator */
    .cd-sep {
      font-family: 'Raleway', sans-serif;
      font-size: clamp(2rem, 6vw, 3.5rem);
      font-weight: 900;
      color: var(--color-secondary);
      margin-bottom: 1.5rem;
      opacity: .6;
    }

    /* Expired state */
    .expired-msg {
      display: none;
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--color-secondary);
    }

    /* Demo heading */
    .demo-head {
      font-family: 'Raleway', sans-serif;
      font-weight: 900;
      font-size: clamp(1.5rem, 4vw, 2.5rem);
      color: var(--color-text);
      margin-bottom: .75rem;
    }
    .demo-sub {
      color: var(--color-muted);
      font-size: .95rem;
      margin-bottom: 2.5rem;
    }
  </style>
</head>
<body>

<!-- ═══════════════════════════════════════════════════════ -->
<!-- COUNTDOWN TIMER COMPONENT                               -->
<!-- ═══════════════════════════════════════════════════════ -->
<section class="countdown-section" id="countdownSection">

  <!-- Demo heading (remove in production) -->
  <div class="demo-head">Future of AI in Business Summit</div>
  <div class="demo-sub">28 Mei 2026 · 09.00 WIB · Online via Zoom</div>

  <p class="countdown-label">Acara dimulai dalam</p>

  <div class="countdown-wrap" id="countdownWrap">
    <div class="cd-block">
      <span class="cd-num" id="cd-days">00</span>
      <span class="cd-lbl">Hari</span>
    </div>
    <span class="cd-sep">:</span>
    <div class="cd-block">
      <span class="cd-num" id="cd-hours">00</span>
      <span class="cd-lbl">Jam</span>
    </div>
    <span class="cd-sep">:</span>
    <div class="cd-block">
      <span class="cd-num" id="cd-minutes">00</span>
      <span class="cd-lbl">Menit</span>
    </div>
    <span class="cd-sep">:</span>
    <div class="cd-block">
      <span class="cd-num" id="cd-seconds">00</span>
      <span class="cd-lbl">Detik</span>
    </div>
  </div>

  <div class="expired-msg" id="expiredMsg">
    🎉 Acara sedang berlangsung!
  </div>
</section>
<!-- / COUNTDOWN TIMER COMPONENT -->

<script>
  // ── KONFIGURASI — ganti tanggal target ───────────────────────
  // Format: 'YYYY-MM-DDTHH:MM:SS'  (waktu lokal server/user)
  const COUNTDOWN_TARGET = '2026-05-28T09:00:00';
  // ─────────────────────────────────────────────────────────────

  const pad  = n => String(n).padStart(2, '0');
  const els  = {
    days:    document.getElementById('cd-days'),
    hours:   document.getElementById('cd-hours'),
    minutes: document.getElementById('cd-minutes'),
    seconds: document.getElementById('cd-seconds'),
  };
  const targetMs = new Date(COUNTDOWN_TARGET).getTime();

  // Flip animation helper
  function setDigit(el, val) {
    const padded = pad(val);
    if (el.textContent === padded) return;
    el.classList.add('flip');
    setTimeout(() => {
      el.textContent = padded;
      el.classList.remove('flip');
    }, 150);
  }

  function tick() {
    const now  = Date.now();
    const diff = targetMs - now;

    if (diff <= 0) {
      // Expired
      Object.values(els).forEach(el => (el.textContent = '00'));
      document.getElementById('countdownWrap').style.opacity = '.3';
      document.getElementById('expiredMsg').style.display = 'block';
      return;
    }

    const d = Math.floor(diff / 86400000);
    const h = Math.floor((diff % 86400000) / 3600000);
    const m = Math.floor((diff % 3600000)  / 60000);
    const s = Math.floor((diff % 60000)    / 1000);

    setDigit(els.days,    d);
    setDigit(els.hours,   h);
    setDigit(els.minutes, m);
    setDigit(els.seconds, s);
  }

  tick();
  setInterval(tick, 1000);
</script>
</body>
</html>
