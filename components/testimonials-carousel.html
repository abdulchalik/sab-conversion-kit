<!DOCTYPE html>
<!--
  ╔══════════════════════════════════════════════════════╗
  ║  COMPONENT: testimonials-carousel                    ║
  ║  Style: Light bg, slide carousel + dots + autoplay   ║
  ║  Source: landing-sablanding.html                     ║
  ║  Customise: TESTIMONIALS array in <script> below.    ║
  ╚══════════════════════════════════════════════════════╝
-->
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Component: Testimonials Carousel</title>
  <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    :root {
      --color-primary:   #234292;
      --color-secondary: #03C383;
      --color-dark:      #0D1B3E;
      --color-light:     #F4F7FF;
      --color-text:      #3D4F6E;
      --color-text-light:#6B7DA0;
      --color-border:    #E4EBF5;
    }
    body { font-family: 'Open Sans', sans-serif; margin: 0; background: var(--color-light); }

    /* ── Section ── */
    .testi-section { background: var(--color-light); padding: 5rem 0; }

    .section-label {
      display: inline-flex; align-items: center; gap: .5rem;
      font-size: .7rem; font-weight: 700;
      letter-spacing: .1em; text-transform: uppercase;
      color: var(--color-primary);
    }
    .section-label-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--color-secondary); }

    .grad-text {
      background: linear-gradient(135deg, var(--color-primary), var(--color-secondary));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }

    /* ── Carousel ── */
    .testi-viewport {
      overflow: hidden;
      border-radius: 1rem;
    }
    .testi-track {
      display: flex;
      transition: transform .5s cubic-bezier(.4,0,.2,1);
      will-change: transform;
    }
    .testi-slide {
      flex: 0 0 100%;
      min-width: 100%;
      padding: 0 .5rem;
    }

    /* ── Card ── */
    .testi-card {
      background: #fff;
      border-radius: 1rem;
      padding: 2rem;
      border: 1px solid var(--color-border);
      box-shadow: 0 4px 24px rgba(35,66,146,.07);
      min-height: 200px;
    }

    /* Avatar */
    .testi-avatar {
      width: 48px; height: 48px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-weight: 800; font-size: 1rem;
      background: linear-gradient(135deg, var(--color-primary), var(--color-secondary));
      color: #fff;
      flex-shrink: 0;
    }

    /* Stars */
    .testi-stars { color: #F59E0B; letter-spacing: .06em; }

    /* ── Nav buttons ── */
    .testi-nav-btn {
      width: 40px; height: 40px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      border: 1.5px solid var(--color-border);
      background: #fff;
      cursor: pointer;
      transition: background .2s, border-color .2s, color .2s;
      color: var(--color-text);
    }
    .testi-nav-btn:hover { background: var(--color-primary); border-color: var(--color-primary); color: #fff; }

    /* ── Dot indicators ── */
    .testi-dot {
      width: 8px; height: 8px; border-radius: 9999px;
      background: var(--color-border);
      border: none; cursor: pointer;
      transition: background .3s, width .3s;
      padding: 0;
    }
    .testi-dot.active { background: var(--color-primary); width: 24px; }

    /* Reveal */
    .anim-fade { opacity: 0; transform: translateY(20px); transition: opacity .6s, transform .6s; }
    .anim-fade.anim-in { opacity: 1; transform: translateY(0); }
    .d-100 { transition-delay: .1s; } .d-200 { transition-delay: .2s; }
  </style>
</head>
<body>

<!-- ═══════════════════════════════════════════════════════ -->
<!-- TESTIMONIALS CAROUSEL COMPONENT                         -->
<!-- ═══════════════════════════════════════════════════════ -->
<section class="testi-section" id="testiSection">
  <div class="max-w-5xl mx-auto px-6 lg:px-10">

    <!-- Header -->
    <div class="text-center mb-12">
      <div class="section-label justify-center anim-fade">
        <span class="section-label-dot"></span>
        Testimonial
      </div>
      <h2 class="font-extrabold text-3xl lg:text-4xl mt-3 anim-fade d-100"
          style="color: var(--color-dark)">
        Kata Mereka tentang <span class="grad-text">SAB</span>
      </h2>
    </div>

    <!-- Carousel -->
    <div class="relative anim-fade d-200">
      <div class="testi-viewport">
        <div class="testi-track" id="testiTrack">
          <!-- Slides injected by JS -->
        </div>
      </div>

      <!-- Controls -->
      <div class="flex items-center justify-center gap-4 mt-8">
        <button class="testi-nav-btn" id="testiPrev" aria-label="Sebelumnya">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
          </svg>
        </button>

        <div class="flex items-center gap-2" id="testiDots"></div>

        <button class="testi-nav-btn" id="testiNext" aria-label="Berikutnya">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/>
          </svg>
        </button>
      </div>
    </div>

  </div>
</section>
<!-- / TESTIMONIALS CAROUSEL COMPONENT -->

<script>
  // ── KONFIGURASI — tambah / ubah testimonial di sini ─────────
  const TESTIMONIALS = [
    {
      initials: 'MA',
      name:     'M. Aghnia Syahputra',
      company:  'LP3I Indonesia',
      stars:    5,
      quote:    '"My business collecting new leads every day using the custom strategy that SAB built for us. The system works even when I\'m not at the office — leads just keep coming in automatically."',
    },
    {
      initials: 'AV',
      name:     'Ariandes Veddytarro',
      company:  'Brand Manager Ardium, PT Servier Indonesia',
      stars:    5,
      quote:    '"SAB achieved transparent budget management and hit the agreed KPI. Website yang dibuat melebihi ekspektasi yang saya punya. Sangat profesional dan komunikatif sepanjang proyek."',
    },
    {
      initials: 'DH',
      name:     'Dede Heri Kusaeri',
      company:  'NPS Pemuda Berdikarisma',
      stars:    5,
      quote:    '"My company\'s website was redesigned by SAB and we started to get high quality leads in the pipeline. The difference was immediate — from almost no digital presence to generating leads consistently."',
    },
    {
      initials: 'FB',
      name:     'Felix Bauer',
      company:  'woogency | WP Agentur',
      stars:    5,
      quote:    '"What I value most about SAB is their reliability and the deliverability. Across multiple projects they have consistently delivered great results. A trustworthy partner for the long term."',
    },
  ];
  // ─────────────────────────────────────────────────────────────

  const track   = document.getElementById('testiTrack');
  const dotsWrap = document.getElementById('testiDots');
  let current = 0;

  // Build slides
  TESTIMONIALS.forEach((t, i) => {
    track.innerHTML += `
      <div class="testi-slide" aria-label="Testimoni ${i+1} dari ${TESTIMONIALS.length}">
        <div class="testi-card">
          <div class="flex items-start gap-4 mb-4">
            <div class="testi-avatar">${t.initials}</div>
            <div>
              <div class="testi-stars">${'★'.repeat(t.stars)}</div>
              <p class="font-bold mt-1" style="color: var(--color-dark)">${t.name}</p>
              <p class="text-xs" style="color: var(--color-text-light)">${t.company}</p>
            </div>
          </div>
          <p style="color: var(--color-text); line-height:1.7">${t.quote}</p>
        </div>
      </div>`;

    const dot = document.createElement('button');
    dot.className = 'testi-dot' + (i === 0 ? ' active' : '');
    dot.dataset.idx = i;
    dot.setAttribute('aria-label', `Testimoni ${i+1}`);
    dotsWrap.appendChild(dot);
  });

  const dots = dotsWrap.querySelectorAll('.testi-dot');
  const total = TESTIMONIALS.length;

  function goTo(idx) {
    current = (idx + total) % total;
    track.style.transform = `translateX(-${current * 100}%)`;
    dots.forEach((d, i) => d.classList.toggle('active', i === current));
  }

  document.getElementById('testiPrev').addEventListener('click', () => { clearAuto(); goTo(current - 1); resetAuto(); });
  document.getElementById('testiNext').addEventListener('click', () => { clearAuto(); goTo(current + 1); resetAuto(); });
  dots.forEach(d => d.addEventListener('click', () => { clearAuto(); goTo(+d.dataset.idx); resetAuto(); }));

  // Autoplay
  let autoTimer;
  function clearAuto() { clearInterval(autoTimer); }
  function resetAuto() { autoTimer = setInterval(() => goTo(current + 1), 5000); }
  resetAuto();

  // Touch / swipe
  let touchStartX = 0;
  track.parentElement.addEventListener('touchstart', e => { touchStartX = e.touches[0].clientX; }, { passive: true });
  track.parentElement.addEventListener('touchend', e => {
    const diff = touchStartX - e.changedTouches[0].clientX;
    if (Math.abs(diff) > 40) { clearAuto(); goTo(diff > 0 ? current + 1 : current - 1); resetAuto(); }
  });

  // Reveal section
  if ('IntersectionObserver' in window) {
    const obs = new IntersectionObserver(entries => {
      entries.forEach(e => { if (e.isIntersecting) { e.target.classList.add('anim-in'); obs.unobserve(e.target); } });
    }, { threshold: 0.1 });
    document.querySelectorAll('.anim-fade').forEach(el => obs.observe(el));
  } else { document.querySelectorAll('.anim-fade').forEach(el => el.classList.add('anim-in')); }
</script>
</body>
</html>
