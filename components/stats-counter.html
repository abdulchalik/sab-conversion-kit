<!DOCTYPE html>
<!--
  ╔══════════════════════════════════════════════════════╗
  ║  COMPONENT: stats-counter                            ║
  ║  Style: Solid primary-bg, animated count-up          ║
  ║  Source: landing-sablanding.html (Stats section)     ║
  ║  Customise: stats array in <script> below.           ║
  ╚══════════════════════════════════════════════════════╝
-->
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Component: Stats Counter</title>
  <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    :root {
      --color-primary:   #234292;
      --color-secondary: #03C383;
    }
    body { font-family: 'Open Sans', sans-serif; margin: 0; background: #f4f7ff; }

    /* ── Stats section ── */
    .stats-section {
      background: var(--color-primary);
      padding: 4rem 0;
    }

    .stat-number {
      font-size: clamp(2.25rem, 5vw, 3rem);
      font-weight: 800;
      color: #fff;
      line-height: 1;
      font-family: 'Open Sans', sans-serif;
    }
    .stat-label {
      font-size: .875rem;
      color: rgba(147,197,253,1); /* blue-300 */
      font-weight: 600;
      margin-top: .5rem;
    }
    .stat-item {
      text-align: center;
      padding: 1.5rem 1rem;
    }
    .stat-divider {
      border-right: 1px solid rgba(255,255,255,.15);
    }

    /* Reveal */
    .anim-fade { opacity: 0; transform: translateY(16px); transition: opacity .6s, transform .6s; }
    .anim-fade.anim-in { opacity: 1; transform: translateY(0); }
    .d-100 { transition-delay: .1s; } .d-200 { transition-delay: .2s; } .d-300 { transition-delay: .3s; }
  </style>
</head>
<body>

<!-- Demo spacer -->
<div style="height:60px; display:flex; align-items:center; justify-content:center;
            font-family: sans-serif; font-size:.85rem; color:#888;">
  ↓ Stats Counter Component ↓
</div>

<!-- ═══════════════════════════════════════════════════════ -->
<!-- STATS COUNTER COMPONENT                                 -->
<!-- ═══════════════════════════════════════════════════════ -->
<section class="stats-section" id="statsSection" aria-label="Statistik SAB">
  <div class="max-w-7xl mx-auto px-6 lg:px-10">
    <div class="grid grid-cols-2 lg:grid-cols-4" id="statsGrid">
      <!-- JS will inject stat items here -->
    </div>
  </div>
</section>
<!-- / STATS COUNTER COMPONENT -->

<script>
  // ── KONFIGURASI — ubah data di sini ──────────────────────────
  const STATS = [
    { value: 100,  suffix: '+',  label: 'Klien Aktif' },
    { value: 420,  suffix: '%',  label: 'Rata-rata Peningkatan Revenue' },
    { value: 211,  suffix: '%',  label: 'Rata-rata Pertumbuhan Traffic' },
    { value: 7,    suffix: '+',  label: 'Tahun Pengalaman' },
  ];
  // ─────────────────────────────────────────────────────────────

  // Render stat items
  const grid = document.getElementById('statsGrid');
  STATS.forEach((s, i) => {
    const last = i === STATS.length - 1;
    grid.innerHTML += `
      <div class="stat-item anim-fade d-${i * 100} ${!last ? 'stat-divider' : ''}">
        <p class="stat-number" id="stat-num-${i}">0${s.suffix}</p>
        <p class="stat-label">${s.label}</p>
      </div>`;
  });

  // Animated count-up
  function countUp(el, target, suffix, duration = 1800) {
    let start = 0;
    const step = target / (duration / 16);
    const timer = setInterval(() => {
      start = Math.min(start + step, target);
      el.textContent = Math.round(start) + suffix;
      if (start >= target) clearInterval(timer);
    }, 16);
  }

  // Trigger on intersect
  const section = document.getElementById('statsSection');
  let counted = false;
  const obs = new IntersectionObserver(entries => {
    if (entries[0].isIntersecting && !counted) {
      counted = true;
      // Reveal animation
      section.querySelectorAll('.anim-fade').forEach(el => el.classList.add('anim-in'));
      // Count-up
      STATS.forEach((s, i) => {
        const el = document.getElementById('stat-num-' + i);
        if (el) setTimeout(() => countUp(el, s.value, s.suffix), i * 120);
      });
    }
  }, { threshold: 0.3 });
  obs.observe(section);
</script>
</body>
</html>
