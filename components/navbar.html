<!DOCTYPE html>
<!--
  ╔══════════════════════════════════════════════════════╗
  ║  COMPONENT: navbar                                   ║
  ║  Source: landing-sablanding.html                     ║
  ║  Usage: Copy <nav> block into your page.             ║
  ║         Include the <style> and <script> blocks.     ║
  ║  Customise: Change nav-links, logo, WA number,       ║
  ║             and --color-* CSS variables.             ║
  ╚══════════════════════════════════════════════════════╝
-->
<html lang="id" class="scroll-smooth">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Component: Navbar</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    :root {
      --color-primary:   #234292;
      --color-secondary: #03C383;
      --color-action:    #1E90FF;
      --color-dark:      #0D1B3E;
      --color-light:     #F4F7FF;
      --color-text:      #3D4F6E;
      --color-border:    #E4EBF5;
      --color-wa:        #25D366;
    }
    body { font-family: 'Open Sans', sans-serif; background: var(--color-light); min-height: 200vh; }

    /* ── Navbar ── */
    #navbar {
      transition: background .3s, box-shadow .3s;
      background: transparent;
    }
    #navbar.scrolled {
      background: rgba(255,255,255,.96);
      backdrop-filter: blur(12px);
      box-shadow: 0 2px 24px rgba(35,66,146,.10);
    }
    .nav-link {
      color: var(--color-text);
      font-weight: 600;
      font-size: .875rem;
      text-decoration: none;
      transition: color .2s;
      position: relative;
    }
    .nav-link::after {
      content: '';
      position: absolute;
      bottom: -4px; left: 0; right: 0; height: 2px;
      background: var(--color-secondary);
      transform: scaleX(0);
      transition: transform .2s;
    }
    .nav-link:hover { color: var(--color-primary); }
    .nav-link:hover::after { transform: scaleX(1); }

    .btn-primary {
      display: inline-flex; align-items: center; gap: .5rem;
      background: var(--color-primary);
      color: #fff;
      font-weight: 700; font-size: .875rem;
      padding: .625rem 1.25rem;
      border-radius: .75rem;
      text-decoration: none;
      transition: opacity .2s, transform .15s;
    }
    .btn-primary:hover { opacity: .9; transform: translateY(-1px); }

    .btn-wa {
      display: inline-flex; align-items: center; gap: .5rem;
      background: var(--color-wa);
      color: #fff;
      font-weight: 700; font-size: .875rem;
      padding: .625rem 1.25rem;
      border-radius: .75rem;
      text-decoration: none;
      transition: opacity .2s, transform .15s;
    }
    .btn-wa:hover { opacity: .9; transform: translateY(-1px); }

    /* ── Hamburger ── */
    .hamburger-line {
      display: block; width: 22px; height: 2px;
      background: var(--color-dark);
      border-radius: 2px;
      transition: transform .3s, opacity .3s;
    }
    #menuBtn.open .hamburger-line:nth-child(1) { transform: translateY(7px) rotate(45deg); }
    #menuBtn.open .hamburger-line:nth-child(2) { opacity: 0; }
    #menuBtn.open .hamburger-line:nth-child(3) { transform: translateY(-7px) rotate(-45deg); }

    /* ── Mobile menu ── */
    .mobile-menu {
      max-height: 0;
      overflow: hidden;
      transition: max-height .35s ease;
    }
    .mobile-menu.open { max-height: 400px; }

    /* Demo spacer */
    .demo-body { padding: 6rem 2rem 2rem; text-align: center; color: var(--color-text); }
    .demo-body h2 { font-size: 1.5rem; font-weight: 700; color: var(--color-dark); }
    .demo-body p { margin-top: .5rem; font-size: .9rem; opacity: .7; }
  </style>
</head>
<body>

<!-- ═══════════════════════════════════════════════════════ -->
<!-- NAVBAR COMPONENT                                        -->
<!-- ═══════════════════════════════════════════════════════ -->
<nav id="navbar" class="fixed top-0 left-0 right-0 z-50 px-6 lg:px-10 py-4">

    <a href="#" class="flex items-center gap-2.5">
      <div class="w-9 h-9 rounded-xl flex items-center justify-center shadow-md"
           style="background: var(--color-primary)">
        <span class="text-white font-bold text-sm tracking-wide">SAB</span>
      </div>
      <span class="font-bold text-lg" style="color: var(--color-primary)">
        SAB<span style="color: var(--color-secondary)">.</span>id
      </span>

    <!-- Desktop Nav Links -->
    <div class="hidden lg:flex items-center gap-8">

    <div class="hidden lg:flex items-center gap-3">
      <a href="https://wa.me/6282177336889" target="_blank" rel="noopener" class="btn-wa text-sm px-5 py-2.5">
        <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 24 24" aria-hidden="true">
          <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/>

    <button id="menuBtn" class="lg:hidden flex flex-col gap-1.5 p-2 rounded-lg"
            aria-label="Toggle menu" aria-expanded="false">
      <span class="hamburger-line"></span>
      <span class="hamburger-line"></span>
      <span class="hamburger-line"></span>
    </button>
  </div>

  <!-- Mobile Menu -->
  <div id="mobileMenu" class="mobile-menu lg:hidden absolute top-full left-0 right-0
       bg-white shadow-xl border-t border-gray-100 px-6 py-4">
    <div class="flex flex-col gap-4 max-w-7xl mx-auto">
      <a href="#services"    class="nav-link py-2 border-b border-gray-50">Services</a>
      <a href="#casestudies" class="nav-link py-2 border-b border-gray-50">Case Studies</a>
      <a href="#pricing"     class="nav-link py-2 border-b border-gray-50">Pricing</a>
      <a href="#contact"     class="nav-link py-2 border-b border-gray-50">Kontak</a>
      <div class="flex gap-3 pt-2">
        <a href="https://wa.me/6282177336889" target="_blank" class="btn-wa text-sm flex-1 py-2.5 justify-center">WhatsApp</a>
        <a href="#contact" class="btn-primary text-sm flex-1 py-2.5 justify-center">Konsultasi Gratis</a>
      </div>
    </div>
  </div>
</nav>
<!-- / NAVBAR COMPONENT -->

<!-- Demo content so scroll effect is visible -->
<div class="demo-body">
  <h2>Navbar Component</h2>
  <p>Scroll ke bawah untuk melihat efek scrolled state.</p>
  <p style="margin-top:60vh; opacity:.3">↑ Scroll up to top</p>
</div>

<script>
  (() => {
    'use strict';
    const navbar   = document.getElementById('navbar');
    const menuBtn  = document.getElementById('menuBtn');
    const mobileMenu = document.getElementById('mobileMenu');

    // Scroll effect
    window.addEventListener('scroll', () => {
      navbar.classList.toggle('scrolled', window.scrollY > 40);
    }, { passive: true });

    // Hamburger toggle
    menuBtn.addEventListener('click', () => {
      const open = mobileMenu.classList.toggle('open');
      menuBtn.classList.toggle('open', open);
      menuBtn.setAttribute('aria-expanded', open);
    });

    // Close mobile menu on link click
    mobileMenu.querySelectorAll('a').forEach(a => {
      a.addEventListener('click', () => {
        mobileMenu.classList.remove('open');
        menuBtn.classList.remove('open');
        menuBtn.setAttribute('aria-expanded', 'false');
      });
    });

    // Smooth anchor scroll (offset for fixed navbar)
    document.querySelectorAll('a[href^="#"]').forEach(a => {
      a.addEventListener('click', e => {
        const target = document.querySelector(a.getAttribute('href'));
        if (!target) return;
        e.preventDefault();
        const offset = navbar.offsetHeight + 16;
        window.scrollTo({ top: target.offsetTop - offset, behavior: 'smooth' });
      });
    });
  })();
</script>
</body>
</html>
