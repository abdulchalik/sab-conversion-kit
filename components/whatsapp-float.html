<!DOCTYPE html>
<!--
  ╔══════════════════════════════════════════════════════╗
  ║  COMPONENT: whatsapp-float                           ║
  ║  Usage: Paste the <a class="wa-float"> element       ║
  ║         anywhere inside <body>.                      ║
  ║  Customise: Change WA_NUMBER and WA_MESSAGE below.   ║
  ╚══════════════════════════════════════════════════════╝
-->
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Component: WhatsApp Float</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    /* ── WhatsApp Float ── */
    .wa-float {
      position: fixed;
      bottom: 28px;
      right: 28px;
      z-index: 9999;
      width: 56px;
      height: 56px;
      border-radius: 50%;
      background: #25D366;
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 20px rgba(37,211,102,.55);
      text-decoration: none;
      transition: transform .25s, box-shadow .25s;
    }
    .wa-float:hover {
      transform: scale(1.1);
      box-shadow: 0 6px 28px rgba(37,211,102,.7);
    }
    /* Pulse ring animation */
    .wa-float::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 50%;
      background: #25D366;
      opacity: .35;
      animation: wa-ring 2.2s ease-out infinite;
    }
    @keyframes wa-ring {
      0%   { transform: scale(1);   opacity: .35; }
      100% { transform: scale(1.7); opacity: 0; }
    }

    /* Tooltip on hover */
    .wa-float .wa-tooltip {
      position: absolute;
      right: calc(100% + 12px);
      background: #0b3d2e;
      color: #fff;
      font-size: .78rem;
      font-weight: 600;
      font-family: system-ui, sans-serif;
      white-space: nowrap;
      padding: .4rem .8rem;
      border-radius: .5rem;
      pointer-events: none;
      opacity: 0;
      transform: translateX(6px);
      transition: opacity .2s, transform .2s;
    }
    .wa-float:hover .wa-tooltip {
      opacity: 1;
      transform: translateX(0);
    }

    body { background: #f4f4f4; font-family: system-ui, sans-serif;
           display: flex; align-items: center; justify-content: center;
           min-height: 100vh; color: #444; text-align: center; }
    .demo { max-width: 400px; }
    .demo h2 { font-size: 1.4rem; font-weight: 700; color: #1a1a2e; }
    .demo p  { margin-top: .5rem; font-size: .9rem; opacity: .6; }
  </style>
</head>
<body>

<div class="demo">
  <h2>WhatsApp Float Component</h2>
  <p>Lihat tombol WhatsApp di pojok kanan bawah.</p>
  <p style="margin-top:1rem;font-size:.8rem;opacity:.4">Hover untuk melihat tooltip.</p>
</div>

<!-- ═══════════════════════════════════════════════════════ -->
<!-- WHATSAPP FLOAT COMPONENT                                -->
<!-- ═══════════════════════════════════════════════════════ -->
<!--
  KONFIGURASI:
  - Ganti WA_NUMBER  → nomor WhatsApp Anda (format: 62XXXXXXXXXX)
  - Ganti WA_MESSAGE → pesan otomatis yang dikirim saat pengguna klik
-->
<script>
  const WA_NUMBER  = '6282177336889';
  const WA_MESSAGE = 'Halo, saya ingin bertanya tentang layanan Anda.';
</script>

<a id="waFloat" href="#" target="_blank" rel="noopener"

  </svg>
  <span class="wa-tooltip">Chat WhatsApp</span>
</a>

<script>
  // Set dynamic href from config variables above
  document.getElementById('waFloat').href =
    'https://wa.me/' + WA_NUMBER + '?text=' + encodeURIComponent(WA_MESSAGE);
</script>
</body>
</html>
